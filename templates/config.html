<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curfew 系统 - 配置</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>⚙️ 系统配置</h1>
            <nav class="nav">
                <a href="/">仪表盘</a>
                <a href="/config" class="active">配置</a>
                <a href="/schedule">时段管理</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>🖥️ 系统模式</h2>
            <div class="form-group">
                <select id="system-mode">
                    <option value="windows">Windows 系统</option>
                    <option value="linux">Linux 系统</option>
                    <option value="custom">自定义模式</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>⚡ 操作类型</h2>
            <div class="form-group">
                <select id="action-type">
                    <option value="shutdown">关机</option>
                    <option value="sleep">睡眠</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>🚀 自启动配置</h2>
            <div class="form-group">
                <label>自启动类型</label>
                <select id="autostart-type">
                    <option value="task scheduler">任务计划程序 (Windows)</option>
                    <option value="systemd">systemd (Linux)</option>
                    <option value="manual">手动</option>
                </select>
            </div>
            <div class="form-group">
                <label>命令</label>
                <input type="text" id="shutdown-command" placeholder="shutdown /s /t 0">
            </div>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="/" class="btn btn-secondary">返回主页</a>
            <button class="btn btn-primary" onclick="saveSettings()">💾 保存配置</button>
        </div>
    </div>

    <footer class="footer">
        <p>Curfew 系统 - 智能宵禁管理</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        const commandMap = {
            'windows-shutdown': 'shutdown /s /t 0',
            'windows-sleep': 'rundll32.exe powrprof.dll,SetSuspendState 0,1,0',
            'linux-shutdown': 'shutdown now',
            'linux-sleep': 'systemctl suspend'
        };

        async function loadSettings() {
            const config = await loadConfig();
            if (!config) return;

            document.getElementById('autostart-type').value = config.autostart_type || 'manual';

            let mode = 'windows';
            if (config.autostart_type === 'systemd') mode = 'linux';
            if (config.autostart_type === 'manual') mode = 'custom';
            document.getElementById('system-mode').value = mode;

            let action = 'shutdown';
            if (config.shutdown_command && config.shutdown_command.includes('suspend')) {
                action = 'sleep';
            }
            document.getElementById('action-type').value = action;

            if (Array.isArray(config.shutdown_command)) {
                document.getElementById('shutdown-command').value = config.shutdown_command.join(' ');
            } else {
                document.getElementById('shutdown-command').value = config.shutdown_command || '';
            }
        }

        function updateCommand() {
            const mode = document.getElementById('system-mode').value;
            const action = document.getElementById('action-type').value;

            if (mode !== 'custom') {
                const key = `${mode}-${action}`;
                document.getElementById('shutdown-command').value = commandMap[key] || '';
            }
        }

        async function saveSettings() {
            const mode = document.getElementById('system-mode').value;
            const action = document.getElementById('action-type').value;
            const autostartType = document.getElementById('autostart-type').value;
            const command = document.getElementById('shutdown-command').value;

            let autostartTypeMap = {
                'windows': 'task scheduler',
                'linux': 'systemd',
                'custom': 'manual'
            };

            let finalCommand = command;
            if (mode === 'linux' && command.includes(' ')) {
                finalCommand = command.split(' ');
            }

            const config = {
                autostart_type: autostartTypeMap[mode] || 'manual',
                shutdown_command: finalCommand,
                restricted_hours: (await loadConfig())?.restricted_hours || {
                    workday: [],
                    weekend: [],
                    holiday: []
                },
                debug: false
            };

            await saveConfig(config);
        }

        document.getElementById('system-mode').addEventListener('change', updateCommand);
        document.getElementById('action-type').addEventListener('change', updateCommand);

        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>
